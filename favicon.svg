<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#4a6b5a"/>
  <g fill="#f5f0e8">
    <!-- sole: wider ball, narrower heel, flatter top -->
    <path d="M23.5 24
             C 23 30, 21.8 36, 23 42
             C 24.3 49, 28 53, 32 53
             C 36 53, 39.7 49, 41 42
             C 42.2 36, 41 30, 40.5 24
             C 39.7 21, 37 20.5, 32 20.5
             C 27 20.5, 24.3 21, 23.5 24 Z"/>
    <!-- big toe -->
    <ellipse cx="25" cy="16.5" rx="3.3" ry="3.8"/>
    <!-- toes -->
    <circle cx="30.5" cy="14.5" r="2.3"/>
    <circle cx="35"   cy="14.8" r="2.0"/>
    <circle cx="38.8" cy="15.8" r="1.8"/>
    <circle cx="42"   cy="17.4" r="1.6"/>
  </g>
  <!-- reflex point -->
  <circle cx="27" cy="34" r="2.6" fill="#a07c3a"/>
</svg>

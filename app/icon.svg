<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#4a6b5a"/>
  <!-- Foot fills ~84% of the tile; toes sit close to the sole. -->
  <g transform="translate(32 32) scale(1.28) translate(-32.4 -32.85)">
    <g fill="#f5f0e8">
      <!-- sole -->
      <path d="M23.5 26
               C 23 32, 21.8 38, 23 44
               C 24.3 51, 28 54, 32 54
               C 36 54, 39.7 51, 41 44
               C 42.2 38, 41 32, 40.5 26
               C 39.7 23, 37 22.5, 32 22.5
               C 27 22.5, 24.3 23, 23.5 26 Z"/>
      <!-- big toe -->
      <ellipse cx="24.5" cy="16" rx="3.3" ry="3.8"/>
      <!-- toes, tucked in near the sole -->
      <circle cx="30"   cy="14"   r="2.3"/>
      <circle cx="34.5" cy="14.3" r="2.0"/>
      <circle cx="38.5" cy="15.3" r="1.8"/>
      <circle cx="42"   cy="17"   r="1.6"/>
    </g>
    <!-- reflex point -->
    <circle cx="30" cy="36" r="4.2" fill="#c9a35e"/>
  </g>
</svg>
